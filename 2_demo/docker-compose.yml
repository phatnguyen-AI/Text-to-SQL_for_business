version: '3.8'

services:
  sqlserver:
    image: mcr.microsoft.com/mssql/server:2022-latest
    container_name: demo_sqlserver
    environment:
      - ACCEPT_EULA=Y
      - MSSQL_SA_PASSWORD=YourStrong@Passw0rd
      - MSSQL_PID=Developer
    ports:
      - "1434:1433"
    volumes:
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql
    # Lệnh entrypoint tùy chỉnh để chạy init.sql sau khi SQL Server khởi động
    command: /bin/bash -c "/opt/mssql/bin/sqlservr & sleep 15s && /opt/mssql-tools18/bin/sqlcmd -S localhost -U sa -P 'YourStrong@Passw0rd' -C -i /docker-entrypoint-initdb.d/init.sql && wait"
